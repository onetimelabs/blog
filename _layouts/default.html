<!DOCTYPE html>
<html>

<head>
  <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{ site.description }}</title>
  <meta charset="UTF-8">
  <meta name="twitter:card" content="summary" />
  {% seo title=false %}
  <meta name="twitter:card" content="summary" />
  {% include meta.html %}

  <script>
    (function(){
      var t = localStorage.getItem('theme');
      if (t) { document.documentElement.setAttribute('data-theme', t); }
      else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
      // else: dark is CSS default, no attribute needed
    })();
  </script>

  <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/assets/style.css" />
  <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />
  <link rel="canonical" href="{{ site.url }}{{ page.url }}" />

  <meta name="theme-color" content="#000000">
  <link rel="icon" type="image/svg+xml" href="{{ site.baseurl }}/images/favicon.svg" sizes="32x32">
  <link rel="icon" type="image/svg+xml" href="{{ site.baseurl }}/images/favicon.svg" sizes="192x192">

  {% include analytics_head.html %}

  {% include mathjax_head.html %}
</head>

<body>
  <div class="wrapper-container">
    <div class="container">
      <header class="masthead clearfix">

        <nav>
          <div class="site-info">
            <a href="{{ site.url }}/" class="site-avatar">
              <img class="logo-dark" src="{{ site.baseurl }}/images/logo-dark.svg" alt="{{ site.title }}" />
              <img class="logo-light" src="{{ site.baseurl }}/images/logo-light.svg" alt="{{ site.title }}" />
            </a>
            <p class="site-description">{{ site.description }}</p>
          </div>

          <input type="checkbox" id="menu-toggle">
          <label for="menu-toggle" class="wrapper">
            <div class="hamburger">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="menu">
              <a href="{{ site.baseurl }}/">Home</a>
              <a href="{{ site.baseurl }}/search">Search</a>
              <a href="{{ site.baseurl }}/about">About</a>
              <a href="{{ site.baseurl }}/categories">Categories</a>
              <a href="{{ site.baseurl }}/archive">Archive</a>
              <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"></button>
              <img class="tree-decoration" src="{{ site.baseurl }}/images/tree.png" alt="">
            </div>
          </label>
        </nav>
      </header>
    </div>

    <div class="wrapper-main">
      <div id="main" role="main" class="container">
        {{ content }}
      </div>
    </div>


    <div class="container">
      <footer class="footer">
        {% include svg-icons.html %}
      </footer>
    </div>

  </div>

  {% include analytics.html %}

  <script>
    var ICON_SUN = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>';
    var ICON_MOON = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z"/></svg>';

    function setThemeIcon(theme) {
      var btn = document.getElementById('theme-toggle');
      if (btn) btn.innerHTML = theme === 'light' ? ICON_MOON : ICON_SUN;
    }

    function toggleTheme() {
      var el = document.documentElement;
      var current = el.getAttribute('data-theme') || 'dark';
      var next = current === 'light' ? 'dark' : 'light';
      el.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      setThemeIcon(next);
    }

    setThemeIcon(document.documentElement.getAttribute('data-theme') || 'dark');
  </script>

</body>

</html>
